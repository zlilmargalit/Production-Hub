<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Efficiency — Production Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700;800&family=Bricolage+Grotesque:opsz,wght@12..96,400..800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root{
    --bg:#F1EEE9; --surface:#FBF8F2; --surface-2:#FFFDF8; --sunk:#EBE7E0;
    --border:#DDD7CE; --border-strong:#C8C1B5;
    --ink:#1A1714; --ink-2:#6B6259; --ink-3:#A39A91;
    --orange:#F08D39; --orange-bg:#FCE3CC; --clay:#C26C1F;
    --blue:#3852B4; --blue-bg:#E8ECF7; --green:#16A34A; --green-bg:#ECFDF3;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Bricolage Grotesque','Assistant',system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
  button,input{font-family:inherit}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

/* ── shared atoms ─────────────────────────────────────────── */
function NavBar() {
  return (
    <div style={{ height:54, borderBottom:'1px solid var(--ink)', background:'var(--surface)',
      display:'flex', alignItems:'center', gap:26, padding:'0 26px', flexShrink:0 }}>
      <div style={{ display:'flex', alignItems:'center', gap:9 }}>
        <svg width="24" height="17" viewBox="0 0 100 70" fill="none">
          <path d="M 21 62 A 29 29 0 0 1 79 62" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" fill="none" opacity="0.6"/>
          <path d="M 35 62 A 15 15 0 0 1 65 62" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" fill="none" opacity="0.9"/>
          <line x1="6" y1="62" x2="94" y2="62" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" opacity="0.3"/>
          <circle cx="50" cy="62" r="5" fill="#F08D39"/>
        </svg>
        <span style={{ fontWeight:800, fontSize:'0.92rem', letterSpacing:'-0.04em' }}>Production Hub</span>
      </div>
      <div style={{ display:'flex', gap:18, fontSize:'0.66rem', fontWeight:700, letterSpacing:'0.07em', color:'var(--ink-3)' }}>
        {['SHOWS','CREW','TASKS','TEAMS'].map((t,i)=>(
          <span key={t} style={{ color:i===3?'var(--ink)':'var(--ink-3)',
            borderBottom:i===3?'2px solid var(--blue)':'none', paddingBottom:4 }}>{t}</span>
        ))}
      </div>
    </div>
  );
}

/* fold line marker */
function Fold({ label }) {
  return (
    <div style={{ position:'relative', borderTop:'1.5px dashed var(--clay)', margin:'0' }}>
      <span style={{ position:'absolute', right:8, top:-9, background:'var(--bg)', padding:'0 8px',
        fontSize:'0.58rem', fontWeight:800, letterSpacing:'0.1em', textTransform:'uppercase', color:'var(--clay)' }}>
        {label}
      </span>
    </div>
  );
}

/* device-ish viewport frame so "below the fold" is meaningful */
function Screen({ children }) {
  return (
    <div style={{ border:'1px solid var(--ink)', background:'var(--bg)', height:520,
      display:'flex', flexDirection:'column', overflow:'hidden' }}>
      <NavBar />
      <div style={{ flex:1, overflow:'hidden', position:'relative' }}>{children}</div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════════ */
/* AREA 1 — PAGE HEADER + STATS                                  */
/* ════════════════════════════════════════════════════════════ */
function HeaderBefore() {
  return (
    <div style={{ padding:'26px 26px 0' }}>
      <h1 style={{ fontFamily:"'Bricolage Grotesque',sans-serif", fontSize:'4.2rem',
        fontWeight:800, letterSpacing:'-0.05em', lineHeight:0.85 }}>
        Teams<span style={{ color:'var(--blue)' }}>.</span>
      </h1>
      <div style={{ display:'flex', alignItems:'center', gap:14, margin:'14px 0 18px', fontSize:'0.72rem',
        fontWeight:700, letterSpacing:'0.06em', textTransform:'uppercase', color:'var(--ink-3)' }}>
        <span style={{ color:'var(--ink)' }}>01</span>
        <span style={{ width:40, height:1, background:'var(--border-strong)' }} />
        <span>members</span>
      </div>
      <div style={{ borderTop:'1px solid var(--border)', paddingTop:18, display:'grid',
        gridTemplateColumns:'repeat(4,1fr)', gap:12 }}>
        {[['01','TOTAL MEMBERS'],['00','BACKLINERS'],['00','SOUNDMEN'],['00','LIGHTING']].map(([n,l])=>(
          <div key={l} style={{ border:'1px solid var(--ink)', background:'var(--surface)', padding:'18px 16px', minHeight:104 }}>
            <div style={{ fontFamily:"'Bricolage Grotesque',sans-serif", fontSize:'2.4rem', fontWeight:800, letterSpacing:'-0.04em', lineHeight:1 }}>{n}</div>
            <div style={{ display:'flex', alignItems:'center', gap:6, marginTop:14, fontSize:'0.6rem', fontWeight:700, letterSpacing:'0.08em', color:'var(--ink-3)' }}>
              <span style={{ width:6, height:6, borderRadius:'50%', background:'var(--blue)' }} />{l}
            </div>
          </div>
        ))}
      </div>
      <div style={{ marginTop:16 }}><Fold label="↓ fold — content starts here" /></div>
    </div>
  );
}

function HeaderAfter() {
  return (
    <div style={{ padding:'18px 26px 0' }}>
      {/* one compact strip: title + inline metrics + action */}
      <div style={{ display:'flex', alignItems:'flex-end', justifyContent:'space-between', gap:20, flexWrap:'wrap' }}>
        <div style={{ display:'flex', alignItems:'baseline', gap:12 }}>
          <h1 style={{ fontFamily:"'Bricolage Grotesque',sans-serif", fontSize:'1.7rem',
            fontWeight:800, letterSpacing:'-0.04em', lineHeight:1 }}>
            Teams<span style={{ color:'var(--blue)' }}>.</span>
          </h1>
          <span style={{ fontSize:'0.66rem', fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase', color:'var(--ink-3)' }}>1 member</span>
        </div>
        {/* inline metric pills */}
        <div style={{ display:'flex', gap:0, border:'1px solid var(--border-strong)', background:'var(--surface)' }}>
          {[['01','Total'],['00','Backline'],['00','Sound'],['00','Lighting']].map(([n,l],i)=>(
            <div key={l} style={{ padding:'6px 16px', borderLeft:i?'1px solid var(--border)':'none',
              display:'flex', alignItems:'baseline', gap:7 }}>
              <span style={{ fontFamily:"'Bricolage Grotesque',sans-serif", fontSize:'1.1rem', fontWeight:800, letterSpacing:'-0.03em' }}>{n}</span>
              <span style={{ fontSize:'0.6rem', fontWeight:700, letterSpacing:'0.06em', textTransform:'uppercase', color:'var(--ink-3)' }}>{l}</span>
            </div>
          ))}
        </div>
      </div>
      {/* tabs immediately after */}
      <div style={{ display:'flex', gap:0, marginTop:16, border:'1px solid var(--ink)', width:'fit-content' }}>
        {[['Members','1'],['Invite',null],['Activity',null]].map(([t,b],i)=>(
          <div key={t} style={{ padding:'7px 18px', borderLeft:i?'1px solid var(--ink)':'none',
            background:i===0?'var(--ink)':'transparent', color:i===0?'var(--surface)':'var(--ink)',
            fontSize:'0.66rem', fontWeight:700, letterSpacing:'0.06em', textTransform:'uppercase', display:'flex', gap:7, alignItems:'center' }}>
            {t}{b && <span style={{ background:i===0?'var(--orange)':'var(--sunk)', color:i===0?'#fff':'var(--ink-2)', padding:'0 6px', fontSize:'0.58rem' }}>{b}</span>}
          </div>
        ))}
      </div>
      <div style={{ marginTop:16 }}><Fold label="↓ fold — content starts here" /></div>
      {/* now actual content is visible above the fold */}
      <div style={{ paddingTop:16 }}>
        <MemberRow />
      </div>
    </div>
  );
}

function MemberRow() {
  return (
    <div style={{ border:'1px solid var(--border)', background:'var(--surface)', padding:'12px 16px',
      display:'flex', alignItems:'center', gap:12 }}>
      <span style={{ width:34, height:34, borderRadius:'50%', background:'var(--clay)', color:'#fff',
        display:'flex', alignItems:'center', justifyContent:'center', fontSize:'0.8rem', fontWeight:800 }}>T</span>
      <div style={{ flex:1 }}>
        <div style={{ fontFamily:"'Assistant',sans-serif", fontWeight:700, fontSize:'0.92rem' }}>test</div>
        <div style={{ fontSize:'0.72rem', color:'var(--ink-3)', fontStyle:'italic' }}>No email — click to add</div>
      </div>
      <span style={{ fontSize:'0.6rem', fontWeight:800, letterSpacing:'0.06em', background:'var(--blue-bg)', color:'var(--blue)', padding:'3px 9px' }}>PRODUCER</span>
      <span style={{ fontSize:'0.72rem', color:'var(--ink-3)' }}>3d ago</span>
    </div>
  );
}

/* ════════════════════════════════════════════════════════════ */
/* AREA 2 — CONTENT PERMISSIONS                                  */
/* ════════════════════════════════════════════════════════════ */
const PERMS = [
  ['Schedule','Arrival times · Soundcheck · Door opening'],
  ['Logistics','Travel · Vehicles · Hotels · Catering'],
  ['Technical','Tech spec · Stages · Setlist · Equipment'],
];
function PermsBefore() {
  return (
    <div style={{ padding:'20px 26px' }}>
      <div style={{ fontSize:'0.62rem', fontWeight:700, letterSpacing:'0.1em', textTransform:'uppercase', color:'var(--ink-3)', marginBottom:14 }}>Content Permissions</div>
      {PERMS.map(([t,d],i)=>(
        <div key={t} style={{ display:'flex', alignItems:'center', justifyContent:'space-between',
          padding:'16px 0', borderTop:i?'1px solid var(--border)':'1px solid var(--border)' }}>
          <div>
            <div style={{ fontWeight:700, fontSize:'0.95rem', marginBottom:4 }}>{t}</div>
            <div style={{ fontSize:'0.74rem', color:'var(--ink-3)' }}>{d}</div>
          </div>
          <div style={{ display:'flex', gap:22 }}>
            <label style={{ display:'flex', gap:7, alignItems:'center', fontSize:'0.82rem', color:'var(--ink-2)' }}><input type="checkbox" style={{ width:16, height:16 }} /> View</label>
            <label style={{ display:'flex', gap:7, alignItems:'center', fontSize:'0.82rem', color:'var(--ink-2)' }}><input type="checkbox" style={{ width:16, height:16 }} /> Edit</label>
          </div>
        </div>
      ))}
      <div style={{ textAlign:'right', marginTop:14 }}>
        <span style={{ fontSize:'0.82rem', color:'var(--ink-3)' }}>Save</span>
      </div>
    </div>
  );
}
function PermsAfter() {
  const [grid,setGrid] = useState({});
  const tog = k => setGrid(g=>({...g,[k]:!g[k]}));
  return (
    <div style={{ padding:'20px 26px' }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12 }}>
        <div style={{ fontSize:'0.62rem', fontWeight:700, letterSpacing:'0.1em', textTransform:'uppercase', color:'var(--ink-3)' }}>Content Permissions</div>
        <button style={{ fontSize:'0.62rem', fontWeight:700, letterSpacing:'0.05em', textTransform:'uppercase',
          background:'var(--ink)', color:'var(--surface)', border:'none', padding:'5px 14px', cursor:'pointer' }}>Save</button>
      </div>
      {/* tight matrix: header + 3 rows */}
      <div style={{ border:'1px solid var(--ink)', background:'var(--surface)' }}>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 64px 64px', background:'var(--sunk)',
          borderBottom:'1px solid var(--ink)', fontSize:'0.58rem', fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase', color:'var(--ink-3)' }}>
          <span style={{ padding:'7px 14px' }}>Area</span>
          <span style={{ padding:'7px 0', textAlign:'center' }}>View</span>
          <span style={{ padding:'7px 0', textAlign:'center', borderLeft:'1px solid var(--border)' }}>Edit</span>
        </div>
        {PERMS.map(([t,d],i)=>(
          <div key={t} style={{ display:'grid', gridTemplateColumns:'1fr 64px 64px', alignItems:'center',
            borderTop:i?'1px solid var(--border)':'none' }}>
            <div style={{ padding:'9px 14px' }}>
              <span style={{ fontWeight:700, fontSize:'0.85rem' }}>{t}</span>
              <span style={{ fontSize:'0.68rem', color:'var(--ink-3)', marginLeft:8 }}>{d}</span>
            </div>
            {['v','e'].map(c=>{
              const k=t+c, on=grid[k];
              return (
                <button key={c} onClick={()=>tog(k)} style={{ height:38, border:'none',
                  borderLeft:'1px solid var(--border)', cursor:'pointer',
                  background: on?'var(--green-bg)':'transparent', display:'flex', alignItems:'center', justifyContent:'center' }}>
                  <span style={{ width:16, height:16, border:`1.5px solid ${on?'var(--green)':'var(--border-strong)'}`,
                    background:on?'var(--green)':'transparent', color:'#fff', fontSize:'0.7rem', display:'flex', alignItems:'center', justifyContent:'center' }}>{on?'✓':''}</span>
                </button>
              );
            })}
          </div>
        ))}
      </div>
      <p style={{ fontSize:'0.7rem', color:'var(--ink-3)', marginTop:10, lineHeight:1.5 }}>
        אותו מידע, חצי מהגובה. תאים לחיצים ישירות, ה-Save בולט למעלה במקום אפור ונסתר למטה.
      </p>
    </div>
  );
}

/* ════════════════════════════════════════════════════════════ */
/* AREA 3 — FILTER PANEL                                         */
/* ════════════════════════════════════════════════════════════ */
const MONTHS = ['All','May','June','July','Aug','Sep','Oct'];
const TYPES  = ['All','אירוח','אני גיטרה','החלונות הגבוהים','חזרה','להקה','סולו אקוסטי','סולו פסנתר'];
function FilterBefore() {
  return (
    <div style={{ width:300, border:'1px solid var(--ink)', background:'var(--surface)', boxShadow:'4px 6px 0 rgba(26,23,20,0.12)' }}>
      <div style={{ padding:'16px 18px', borderBottom:'1px solid var(--border)' }}>
        <div style={{ fontSize:'0.62rem', fontWeight:700, letterSpacing:'0.1em', color:'var(--ink-3)', marginBottom:12 }}>MONTH</div>
        <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
          {['All','May 2026','June 2026','July 2026','August 2026','September 2026','October 2026'].map((m,i)=>(
            <div key={m} style={{ padding:'9px 14px', border:'1px solid var(--border)',
              background:i===0?'var(--ink)':'transparent', color:i===0?'var(--surface)':'var(--ink)', fontSize:'0.85rem', fontWeight:600 }}>{m}</div>
          ))}
        </div>
      </div>
      <div style={{ padding:'16px 18px' }}>
        <div style={{ fontSize:'0.62rem', fontWeight:700, letterSpacing:'0.1em', color:'var(--ink-3)', marginBottom:12 }}>TYPE</div>
        <div style={{ display:'flex', flexWrap:'wrap', gap:8 }}>
          {['All','אירוח','אני גיטרה','החלונות הגבוהים','חזרה','סולו אקוסטי','להקה','סולו פסנתר'].map((t,i)=>(
            <div key={t} dir="auto" style={{ padding:'9px 14px', border:'1px solid var(--border)',
              background:i===0?'var(--ink)':'transparent', color:i===0?'var(--surface)':'var(--ink)', fontSize:'0.85rem', fontWeight:600 }}>{t}</div>
          ))}
        </div>
      </div>
    </div>
  );
}
function FilterAfter() {
  const [month,setMonth]=useState('All');
  const [type,setType]=useState('All');
  return (
    <div style={{ width:340, border:'1px solid var(--ink)', background:'var(--surface)', boxShadow:'4px 6px 0 rgba(26,23,20,0.12)' }}>
      <div style={{ padding:'12px 16px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <span style={{ fontSize:'0.62rem', fontWeight:700, letterSpacing:'0.1em', color:'var(--ink-3)' }}>MONTH</span>
        <button style={{ fontSize:'0.6rem', color:'var(--blue)', background:'none', border:'none', cursor:'pointer', fontWeight:700 }}>Clear</button>
      </div>
      <div style={{ padding:'10px 16px 14px', display:'flex', flexWrap:'wrap', gap:6 }}>
        {MONTHS.map(m=>(
          <button key={m} onClick={()=>setMonth(m)} style={{ padding:'5px 12px', border:`1px solid ${month===m?'var(--ink)':'var(--border)'}`,
            background:month===m?'var(--ink)':'transparent', color:month===m?'var(--surface)':'var(--ink-2)',
            fontSize:'0.76rem', fontWeight:600, cursor:'pointer' }}>{m}</button>
        ))}
      </div>
      <div style={{ padding:'12px 16px', borderTop:'1px solid var(--border)' }}>
        <span style={{ fontSize:'0.62rem', fontWeight:700, letterSpacing:'0.1em', color:'var(--ink-3)' }}>TYPE</span>
      </div>
      <div style={{ padding:'0 16px 14px', display:'flex', flexWrap:'wrap', gap:6 }}>
        {TYPES.map(t=>(
          <button key={t} dir="auto" onClick={()=>setType(t)} style={{ padding:'5px 12px', border:`1px solid ${type===t?'var(--ink)':'var(--border)'}`,
            background:type===t?'var(--ink)':'transparent', color:type===t?'var(--surface)':'var(--ink-2)',
            fontSize:'0.76rem', fontWeight:600, cursor:'pointer' }}>{t}</button>
        ))}
      </div>
      <div style={{ padding:'10px 16px', borderTop:'1px solid var(--ink)', background:'var(--sunk)', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <span style={{ fontSize:'0.72rem', color:'var(--ink-2)' }}>Showing <b>{month}</b> · <b dir="auto">{type}</b></span>
        <button style={{ fontSize:'0.62rem', fontWeight:700, letterSpacing:'0.05em', textTransform:'uppercase', background:'var(--ink)', color:'var(--surface)', border:'none', padding:'5px 14px', cursor:'pointer' }}>Apply</button>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════════ */
/* COMPARE WRAPPER                                               */
/* ════════════════════════════════════════════════════════════ */
function Compare({ before, after, beforeNote, afterNote, saved }) {
  return (
    <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:24 }}>
      <div>
        <Badge label="Current" tone="warn" extra={beforeNote} />
        {before}
      </div>
      <div>
        <Badge label="Proposed" tone="ok" extra={afterNote} saved={saved} />
        {after}
      </div>
    </div>
  );
}
function Badge({ label, tone, extra, saved }) {
  const ok = tone==='ok';
  return (
    <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:12 }}>
      <span style={{ fontSize:'0.66rem', fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase', color:'var(--ink-3)' }}>{label}</span>
      <div style={{ flex:1, height:1, background:'var(--border)' }} />
      {saved && <span style={{ fontSize:'0.6rem', fontWeight:800, background:'var(--green-bg)', color:'var(--green)', padding:'2px 8px' }}>{saved}</span>}
      <span style={{ fontSize:'0.64rem', fontWeight:800, padding:'2px 8px',
        background: ok?'var(--green-bg)':'var(--orange-bg)', color: ok?'var(--green)':'var(--clay)' }}>{extra}</span>
    </div>
  );
}

/* ── APP ──────────────────────────────────────────────────── */
const TABS = [
  { id:'header', label:'Page Header + Stats' },
  { id:'perms',  label:'Content Permissions' },
  { id:'filter', label:'Filter Panel' },
];
function App() {
  const [tab,setTab] = useState('header');
  return (
    <div style={{ minHeight:'100vh', background:'var(--bg)' }}>
      <header style={{ background:'rgba(251,248,242,0.94)', backdropFilter:'blur(14px)', borderBottom:'1px solid var(--ink)',
        padding:'0 36px', height:56, display:'flex', alignItems:'center', gap:14, position:'sticky', top:0, zIndex:100 }}>
        <span style={{ fontWeight:800, fontSize:'1rem', letterSpacing:'-0.04em' }}>Production Hub</span>
        <span style={{ width:1, height:18, background:'var(--border)' }} />
        <span style={{ fontSize:'0.66rem', fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase', color:'var(--ink-3)' }}>Space Efficiency</span>
      </header>

      <div style={{ maxWidth:1180, margin:'0 auto', padding:'40px 32px 90px' }}>
        <h1 style={{ fontFamily:"'Bricolage Grotesque',sans-serif", fontSize:'clamp(2.6rem,5vw,3.8rem)', fontWeight:800, letterSpacing:'-0.05em', lineHeight:0.9 }}>
          Less scroll<span style={{ color:'var(--orange)' }}>.</span>
        </h1>
        <p style={{ fontSize:'0.875rem', color:'var(--ink-2)', marginTop:14, maxWidth:560, lineHeight:1.6 }}>
          הבעיה: כותרת הענק + כרטיסי הסטטיסטיקה אוכלים ~30% מהמסך בכל עמוד, והתוכן האמיתי יורד מתחת לקפל.
          הפתרון השיטתי: <b>page-bar קומפקטי</b> — אותה זהות מותגית בשבריר מהגובה, סטטיסטיקות inline.
        </p>

        {/* principle callout */}
        <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:8, margin:'28px 0 36px' }}>
          {[
            ['~340px','חוסכים בכותרת','מ-~430px ל-~90px בראש כל עמוד'],
            ['1 שורה','סטטיסטיקות inline','במקום 4 כרטיסים בגובה 104px'],
            ['Above fold','התוכן עולה','רשימת החברים נראית בלי גלילה'],
          ].map(([big,t,d])=>(
            <div key={t} style={{ background:'var(--surface)', border:'1px solid var(--border)', borderLeft:'3px solid var(--blue)', padding:'12px 14px' }}>
              <div style={{ fontFamily:"'Bricolage Grotesque',sans-serif", fontSize:'1.3rem', fontWeight:800, letterSpacing:'-0.03em', color:'var(--blue)' }}>{big}</div>
              <div style={{ fontWeight:700, fontSize:'0.8rem', margin:'4px 0 2px' }}>{t}</div>
              <div style={{ fontSize:'0.72rem', color:'var(--ink-2)', lineHeight:1.4 }}>{d}</div>
            </div>
          ))}
        </div>

        {/* tabs */}
        <div style={{ display:'flex', borderBottom:'2px solid var(--ink)', marginBottom:28 }}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{ padding:'10px 20px', border:'none', background:'none', cursor:'pointer',
              fontFamily:"'Bricolage Grotesque',sans-serif", fontSize:'0.74rem', fontWeight:700, letterSpacing:'0.05em', textTransform:'uppercase',
              color: tab===t.id?'var(--ink)':'var(--ink-3)', borderBottom: tab===t.id?'2px solid var(--orange)':'2px solid transparent', marginBottom:-2 }}>
              {t.label}
            </button>
          ))}
        </div>

        {tab==='header' && (
          <Compare
            beforeNote="430px לפני תוכן" afterNote="90px לפני תוכן" saved="−80% גובה"
            before={<Screen><HeaderBefore/></Screen>}
            after={<Screen><HeaderAfter/></Screen>}
          />
        )}
        {tab==='perms' && (
          <Compare
            beforeNote="~290px" afterNote="~150px" saved="−48% גובה"
            before={<div style={{ border:'1px solid var(--border)', background:'var(--surface)' }}><PermsBefore/></div>}
            after={<div style={{ border:'1px solid var(--border)', background:'var(--surface)' }}><PermsAfter/></div>}
          />
        )}
        {tab==='filter' && (
          <div>
            <Compare
              beforeNote="גבוה — חודשים בעמודה" afterNote="קומפקטי — chips נכרכים"
              before={<div style={{ display:'flex', justifyContent:'center', padding:'10px 0' }}><FilterBefore/></div>}
              after={<div style={{ display:'flex', justifyContent:'center', padding:'10px 0' }}><FilterAfter/></div>}
            />
            <p style={{ fontSize:'0.78rem', color:'var(--ink-2)', marginTop:18, maxWidth:620, lineHeight:1.6 }}>
              החודשים הופכים ל-chips נכרכים (כמו ה-types) במקום עמודה ארוכה, נוסף footer "Showing… / Apply" שמסכם את הבחירה וכפתור Clear. הפאנל יורד מ-~7 שורות לגובה חצי.
            </p>
          </div>
        )}

        {/* extra ideas */}
        <div style={{ marginTop:52, borderTop:'2px solid var(--ink)', paddingTop:28 }}>
          <div style={{ fontSize:'0.66rem', fontWeight:700, letterSpacing:'0.1em', textTransform:'uppercase', color:'var(--ink-3)', marginBottom:14 }}>עקרונות כלליים לכל העמודים</div>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(230px,1fr))', gap:8 }}>
            {[
              ['Sticky page-bar','הכותרת הקומפקטית נשארת למעלה בגלילה — תמיד יודעים איפה אתם'],
              ['סטטיסטיקות כ-strip','מספרים inline בשורה אחת, לא כרטיסים בגובה מלא'],
              ['כותרת ענק = section','שומרים את הטיפוגרפיה הגדולה ל-landing/empty-state בלבד'],
              ['Save תמיד נגיש','כפתור פעולה ראשי בולט למעלה, לא אפור בתחתית'],
              ['Density toggle','מתג Comfortable / Compact למשתמשים עם צוות גדול'],
              ['קפל = יעד','התוכן הראשי תמיד מתחיל בתוך 1 מסך, בלי גלילה'],
            ].map(([t,d])=>(
              <div key={t} style={{ background:'var(--surface)', border:'1px solid var(--border)', padding:'12px 14px' }}>
                <div style={{ fontWeight:700, fontSize:'0.82rem', marginBottom:3 }}>{t}</div>
                <div style={{ fontSize:'0.72rem', color:'var(--ink-2)', lineHeight:1.4 }}>{d}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
